name:                foglang
version:             0.1.0.0
github:              "omcnoe/foglang"
license:             BSD-3-Clause
author:              "Oscar McNoe"
maintainer:          "oscar.mcnoe@gmail.com"
copyright:           "2026 Oscar McNoe"

extra-source-files:
- README.md
- CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/omcnoe/foglang#readme>

dependencies:
- base       == 4.20.2.0
- megaparsec == 9.7.0
- text       == 2.1.3

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src

executables:
  fog:
    main:                Main.hs
    source-dirs:         exe
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - foglang

tests:
  foglang-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - foglang
    - hspec == 2.11.17
